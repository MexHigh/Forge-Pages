on:
  push:
    branches:
      - main
    paths:
      - '.forgejo/workflows/*'
      - Dockerfile
      - '*.go'
      - '*.mod'
      - '*.sum'

env:
  IMAGE_SLUG: ${{ vars.FORGEJO_HOST }}/${{ forgejo.repository }}

jobs:
  docker-build-and-push:
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Lowercase Docker image name
        id: image_string
        uses: https://github.com/ASzc/change-string-case-action@v6
        with:
          string: ${{ env.IMAGE_SLUG }}
      - name: Docker login
        uses: https://github.com/docker/login-action@v3
        with:
          registry: ${{ vars.FORGEJO_HOST }}
          username: ${{ forgejo.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}
      - name: Docker build
        run: docker build -t ${{ steps.image_string.outputs.lowercase }}:${{ forgejo.sha }} .
      - name: Docker push SHA-tagged
        run: docker push ${{ steps.image_string.outputs.lowercase }}:${{ forgejo.sha }}
