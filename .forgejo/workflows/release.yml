on:
  push:
    tags:
      - 'v*'

env:
  IMAGE_SLUG: ${{ vars.FORGEJO_HOST }}/${{ forgejo.repository }}

jobs:
  docker-build-and-push:
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Lowercase Docker image name
        id: image_string
        uses: https://github.com/ASzc/change-string-case-action@v6
        with:
          string: ${{ env.IMAGE_SLUG }}
      - name: Docker login
        uses: https://github.com/docker/login-action@v3
        with:
          registry: ${{ vars.FORGEJO_HOST }}
          username: ${{ forgejo.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}
      - name: Docker build versioned
        run: docker build -t ${{ steps.image_string.outputs.lowercase }}:${{ forgejo.ref_name }} .
      - name: Docker push versioned
        run: docker push ${{ steps.image_string.outputs.lowercase }}:${{ forgejo.ref_name }}
      - name: Docker tag latest
        run: docker tag ${{ steps.image_string.outputs.lowercase }}:${{ forgejo.ref_name }} ${{ steps.image_string.outputs.lowercase }}:latest
      - name: Docker push latest
        run: docker push ${{ steps.image_string.outputs.lowercase }}:latest

  create-release:
    runs-on: debian-node-lts
    steps:
      - name: Lowercase Docker image name
        id: image_string
        uses: https://github.com/ASzc/change-string-case-action@v6
        with:
          string: ${{ env.IMAGE_SLUG }}
      - name: Publish release
        uses: actions/forgejo-release@v2.5.0
        with:
          direction: upload
          token: ${{ forgejo.token }}
          release-notes: |
            Release for **Forge Pages ${{ forgejo.ref_name }}**.
            
            New docker images:
            - `${{ steps.image_string.outputs.lowercase }}:${{ forgejo.ref_name }}` _(new tag)_
            - `${{ steps.image_string.outputs.lowercase }}:latest` _(updated to refer to this version)_
